<!DOCTYPE html>
<html>

<head>

    <title>Experiment</title>

    <link href="https://unpkg.com/jspsych@7.2.3/css/jspsych.css" rel="stylesheet" type="text/css" />

    <style id="jspsych-survey-likert-css">
        .jspsych-survey-likert-statement {
            display: block;
            font-size: 16px;
            padding-top: 30px;
            margin-bottom: 10px;
        }

        .jspsych-survey-likert-opts {
            list-style: none;
            width: " + ";
            margin: auto;
            padding: 10 10 35px;
            display: block;
            font-size: 25px;
            line-height: 1.3em;
        }

        .jspsych-survey-likert-opt-label {
            line-height: 0.9em;
            color: #444;
        }

        .jspsych-survey-likert-opts:before {
            display: none !important;
        }

        .jspsych-survey-likert-opts:last-of-type {
            border-bottom: 0;
        }

        .jspsych-survey-likert-opts li {
            display: inline-block;
            text-align: center;
            vertical-align: top;
        }

        .jspsych-survey-likert-opts li input[type=radio] {
            display: block;
            position: relative;
            top: 0;
            left: 50%;
            margin-left: -6px;
        }
    </style>

    <script src="https://unpkg.com/jspsych@7.2.3"></script>
    <script src='js/jquery.min.js'></script>
    <script src='js/jquery-ui.min.js'></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-likert@1.1.1"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-html-form@1.0.1"></script>
    <script src="https://proliferate.alps.science/static/js/proliferate.js"> </script>
    <script src="https://unpkg.com/@jspsych/plugin-preload@1.1.1"></script>

    <script src='js/intro.js'></script>
    <script src='js/consent.js'></script>
    <script src='js/trial.js'></script>
    <script src='js/demographic_form.js'></script>
</head>

<body></body>
<script>

    let timeline = []

    let jsPsych = initJsPsych({
        show_progress_bar: true,
        on_finish: () => {

            jsPsych.data.displayData();
            const trialData = jsPsych.data.get().filter({ task: "trial_page" }).values()[0];
            const compreData = jsPsych.data.get().filter({ task: "comprehension_check" }).values()[0];

            let responseData = {
                "scenario": trialData["scenario"],
                "designed_condition": trialData["designed_condition"],
                "used_condition": trialData["used_condition"],
                "response": trialData["response"]["Q0"] + 1, // likert scale starts at 0
                "compre_response": compreData["options"][compreData["response"]],
            };

            console.log(responseData);

            let gender = jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].gender
            if (!gender && jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].other_gender) {
                gender = "other_gender"
            }
            let age = parseInt(jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].age)
            let race = jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].race
            if (!race && jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].other_race) {
                race = "other_race"
            }
            let ethnicity = jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].ethnicity
            let religiousStatus = jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].religious
            let religion = jsPsych.data.get().filter({ "page_type": "participant_survey" }).values()[0]["response"].religion

            let demographics = {
                "age": age,
                "gender": gender,
                "race": race,
                "ethnicity": ethnicity,
                "religious_status": religiousStatus,
                "religion": religion
            }

            let data_final = {
                "responses": responseData,
                "participants": demographics,
            }

            console.log(data_final)

            proliferate.submit(data_final);

            $('#jspsych-content').html('<div style="margin: auto;"> <p> Thank you for' +
                ' participating in this experiment! </p> <p> Redirecting you back to' +
                ' Prolific... </p>');
            setTimeout(function () { }, 400);
        }
    })

    // Consent
    timeline.push(consent)

    // Instructions
    timeline.push(intro)

    // Randomization: pick one scenario and one condition (fully between-subjects)
    const scenario = jsPsych.randomization.shuffle(Object.keys(trials))[0];
    const condition = jsPsych.randomization.shuffle([
        ["designed", "used"],
        ["designed", "not_used"],
        ["not_designed", "used"],
        ["not_designed", "not_used"]
    ])[0];
    console.log("scenario:", scenario);
    console.log("condition:", condition);

    // Trial
    const trialPage = {
        type: jsPsychSurveyLikert,
        preamble: `<div style="text-align:left; background-color:lightblue; padding:20px; max-width:1000px;">
                   <p>${trials[scenario]["intro"]}</p>
                   <p>${trials[scenario]["designed_condition"][condition[0]]}</p>
                   <p>${trials[scenario]["used_condition"][condition[1]]}</p>
                   </div>
                   <div style="text-align:center"><br>`,
        questions: [
            {
                prompt: `<b>Please indicate the extent to which you agree or disagree with the following statement:</b><br><br>
                         <div style="font-size:18px;">${trials[scenario]["purpose_question"]}<br><br></div>`,
                labels: [
                    `<br><div style="font-size:17px;">strongly<br>disagree</div>`,
                    `<br><div style="font-size:17px;">disagree</div>`,
                    `<br><div style="font-size:17px;">slightly<br>disagree</div>`,
                    `<br><div style="font-size:17px;">neither disagree or agree</div>`,
                    `<br><div style="font-size:17px;">slightly<br>agree</div>`,
                    `<br><div style="font-size:17px;">agree</div>`,
                    `<br><div style="font-size:17px;">strongly<br>agree</div>`
                ],
                required: true,
            },
        ],
        data: {
            task: "trial_page",
            "scenario": scenario,
            "designed_condition": condition[0],
            "used_condition": condition[1],
        }
    };
    timeline.push(trialPage);

    const comprePage = {
        type: jsPsychHtmlButtonResponse,
        data: {
            task: "comprehension_check",
            "options": trials[scenario]["options"],
            "scenario": scenario,
        },
        stimulus: `<div>${trials[scenario]["comprehension_question"]}</div><br>`,
        choices: trials[scenario]["options"],
    };
    timeline.push(comprePage);

    // Demographics
    timeline.push(demographic_form)

    jsPsych.run(timeline);
</script>

</html>
